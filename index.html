<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaspa Receipts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="header">
      <div class="logo">𐤊</div>
      <h1>Kaspa Receipts</h1>
      <p class="subtitle">Your transactions. On paper.</p>
    </div>

    <div class="input-section">
      <div class="input-group">
        <input type="text" id="tx-input" placeholder="Paste a transaction ID or wallet address..." maxlength="80" spellcheck="false" autocomplete="off" aria-label="Transaction ID or wallet address">
        <button id="generate-btn">Look Up</button>
      </div>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p id="loading-text">Looking up your transaction…</p>
    </div>

    <div id="error" class="error hidden" role="alert"></div>

    <div id="actions-bar" class="actions-bar hidden">
      <button class="btn-export" id="export-csv-btn">Export</button>
    </div>

    <div id="result" class="hidden">
      <div class="receipt-card" id="receipt-card"></div>
      <div id="statement-card" class="hidden"></div>
    </div>


  </main>
  <script src="app.js"></script>
</body>
</html>
