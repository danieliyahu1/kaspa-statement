<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaspa Statement</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="header">
      <div class="logo">𐤊</div>
      <h1>Kaspa Statement</h1>
    </div>

    <div class="input-section">
      <div class="input-group">
        <input type="text" id="tx-input" placeholder="Paste a Kaspa address or transaction..." maxlength="80" spellcheck="false" autocomplete="off">
        <button id="generate-btn">Generate</button>
      </div>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p id="loading-text"></p>
      <div class="progress-bar-container hidden" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <div id="error" class="error hidden" role="alert"></div>

    <div id="actions-bar" class="actions-bar hidden">
      <button class="card-btn card-btn-back" id="export-csv-btn">Download CSV</button>
    </div>

    <div id="result" class="hidden">
      <div class="receipt-card" id="receipt-card"></div>
      <div id="statement-card" class="hidden"></div>
    </div>


  </main>
  <script src="app.js"></script>
</body>
</html>
