<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaspa Statement</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="header">
      <div class="logo">𐤊</div>
      <h1>Kaspa Statement</h1>
      <p class="subtitle">A receipt for every transaction. A statement for your wallet.</p>
    </div>

    <div class="input-section">
      <div class="input-group">
        <input type="text" id="tx-input" placeholder="Paste a transaction ID or wallet address..." maxlength="80" spellcheck="false" autocomplete="off" aria-label="Transaction ID or wallet address">
        <button id="generate-btn">Generate</button>
      </div>
    </div>

    <div id="skeleton" class="skeleton-card">
      <div class="receipt-header">
        <h2>Kaspa Receipt</h2>
      </div>

      <div class="receipt-status">
        <span class="status-badge accepted">
          <span class="check">&#10003;</span> Confirmed
        </span>
      </div>

      <div class="receipt-meta">
        <div class="meta-row">
          <span class="meta-label">Date &amp; Time</span>
          <span class="meta-value">
            <span class="sk-block" style="width:160px;height:13px;display:inline-block;vertical-align:middle;"></span>
          </span>
        </div>
      </div>

      <div class="receipt-section">
        <div class="section-label">From</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="sk-block" style="width:65%;height:12px;display:inline-block;"></span>
          <span class="sk-block" style="width:36px;height:20px;border-radius:6px;display:inline-block;"></span>
        </div>
      </div>

      <div class="receipt-section">
        <div class="section-label">To</div>
        <div class="output-list">
          <div class="output-row">
            <span class="output-address">
              <span class="sk-block" style="width:60%;height:12px;display:inline-block;"></span>
            </span>
            <span class="output-amount">
              <span class="sk-block" style="width:65px;height:13px;display:inline-block;vertical-align:middle;"></span>
            </span>
          </div>
          <div class="output-row">
            <span class="output-address">
              <span class="sk-block" style="width:50%;height:12px;display:inline-block;"></span>
            </span>
            <span class="output-amount">
              <span class="sk-block" style="width:50px;height:13px;display:inline-block;vertical-align:middle;"></span>
            </span>
          </div>
        </div>
      </div>

      <div class="receipt-total">
        <span class="total-label">Total</span>
        <div class="total-values">
          <span class="total-amount">
            <span class="sk-block" style="width:100px;height:18px;display:inline-block;vertical-align:middle;"></span>
          </span>
          <span class="total-usd">
            <span class="sk-block" style="width:65px;height:12px;display:inline-block;vertical-align:middle;"></span>
          </span>
        </div>
      </div>

      <div class="receipt-ref">
        <span class="receipt-ref-label">Transaction ID</span>
        <div class="receipt-ref-hash">
          <span class="sk-block" style="width:120px;height:11px;display:inline-block;vertical-align:middle;"></span>
          <span class="sk-block" style="width:36px;height:20px;border-radius:6px;display:inline-block;"></span>
        </div>
      </div>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p id="loading-text">Looking up your transaction…</p>
      <div class="progress-bar-container hidden" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <div id="error" class="error hidden" role="alert"></div>

    <div id="actions-bar" class="actions-bar hidden">
      <button class="btn-export" id="export-csv-btn">Export</button>
    </div>

    <div id="result" class="hidden">
      <div class="receipt-card" id="receipt-card"></div>
      <div id="statement-card" class="hidden"></div>
    </div>


  </main>
  <script src="app.js"></script>
</body>
</html>
