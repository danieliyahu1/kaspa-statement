<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaspa Receipts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="header">
      <div class="logo">&#9674;</div>
      <h1>Kaspa Receipts</h1>
      <p class="subtitle">Generate a printable receipt for any Kaspa transaction</p>
    </div>

    <div class="input-section">
      <label for="tx-input">Transaction or Address</label>
      <div class="input-group">
        <input type="text" id="tx-input" placeholder="Paste a transaction hash or wallet address..." maxlength="80" spellcheck="false" autocomplete="off">
        <button id="generate-btn">Generate</button>
      </div>
      <p class="input-hint">Hashes have 64 hex characters. Addresses start with <strong>kaspa:</strong></p>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Fetching data from the Kaspa network…</p>
    </div>

    <div id="error" class="error hidden" role="alert"></div>

    <div id="result" class="hidden">
      <div class="receipt-card" id="receipt-card"></div>
      <div id="statement-card" class="hidden"></div>
    </div>

    <footer>
      <p>Powered by <a href="https://api.kaspa.org" target="_blank">api.kaspa.org</a></p>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
